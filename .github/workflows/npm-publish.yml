name: publish

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

env:
  node-version: 24
  npm-version: 11.11.0

# https://docs.npmjs.com/trusted-publishers#step-2-configure-your-cicd-workflow
jobs:
  publish-universal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ env.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.node-version }}
          registry-url: 'https://registry.npmjs.org'
      - run: npm install --global npm@${{ env.npm-version }}
      - run: npm ci
      - run: npm run build -w @tiny-type-api/universal
      - run: cp ./README.md ./packages/universal/README.md
      - run: npm publish -w @tiny-type-api/universal --access public

  publish-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ env.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.node-version }}
          registry-url: 'https://registry.npmjs.org'
      - run: npm install --global npm@${{ env.npm-version }}
      - run: npm ci
      - run: npm run build -w @tiny-type-api/client
      - run: cp ./README.md ./packages/client/README.md
      - run: npm publish -w @tiny-type-api/client --access public
